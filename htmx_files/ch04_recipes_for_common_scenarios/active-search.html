<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXUM: Server-Driven Web Apps with htmx</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.min.css"
    />
  </head>
  <body class="p-6 bg-gray-100">
    <div class="grid gap-3">
      <label for="name" class="label">名字</label>
      <input
        class="input"
        id="name"
        type="text"
        name="name"
        autofocus
        autocomplete="off"
        hx-trigger="keyup changed delay:200ms"
        hx-post="/api/ch04/search"
        hx-target="#matches"
      />
    </div>
    <ul
      id="matches"
      hx-get="/api/ch04/search"
      hx-trigger="load"
      class="my-3"
    ></ul>
    <script
      src="https://lib.axum.eu.org/htmx/2.0.10/htmx.min.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.all.min.js"
      defer
    ></script>
  </body>
</html>

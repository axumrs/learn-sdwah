<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXUM: Server-Driven Web Apps with htmx</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.min.css"
    />
  </head>
  <body
    class="p-6 bg-gray-100"
    hx-ext="response-targets"
    hx-target-400="#result"
  >
    <div
      class="continer mx-auto w-sm left-1/2 -translate-x-1/2 -translate-y-1/2 top-1/2 absolute space-y-6 p-6 bg-white rounded shadow"
    >
      <h2 class="text-xl font-bold">µ│¿Õåî</h2>
      <form
        class="form grid gap-6"
        autocomplete="off"
        hx-post="/api/ch04/register-user"
        hx-target="#result"
        hx-on:htmx:after-request="
        console.log(event);
        if(event.detail.pathInfo.requestPath === '/api/ch04/register-user' && event.detail.successful) {
            this.reset();
        }"
      >
        <div class="grid gap-2">
          <label for="email">Úé«þ«▒</label>
          <input
            type="email"
            id="email"
            name="email"
            hx-get="/api/ch04/email-validate"
            hx-sync="closest form:abort"
            hx-target="#email-error-msg"
            hx-trigger="keyup changed delay:200ms"
          />
          <p class="text-sm text-red-600" id="email-error-msg"></p>
        </div>
        <div class="grid gap-2">
          <label for="password">Õ»åþáü</label>
          <input
            type="password"
            id="password"
            name="password"
            hx-get="/api/ch04/password-validate"
            hx-target="#password-error-msg"
            hx-trigger="blur"
          />
          <p class="text-sm text-red-600" id="password-error-msg"></p>
        </div>

        <div>
          <button type="submit" class="btn">µ│¿Õåî</button>
        </div>
      </form>
      <div id="result" class="text-green-600"></div>
    </div>

    <script
      src="https://lib.axum.eu.org/htmx/2.0.10/htmx.min.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/htmx-ext/htmx-ext-response-targets-2.0.4.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/alpinejs/3.15.12/alpinejs.min.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.all.min.js"
      defer
    ></script>
  </body>
</html>

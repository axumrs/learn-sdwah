<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXUM: Server-Driven Web Apps with htmx</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.min.css"
    />
  </head>
  <body class="bg-gray-100" x-data="{ editingId: '' }" @click="editingId = ''">
    <main
      class="continer mx-auto w-sm left-1/2 -translate-x-1/2 -translate-y-1/2 top-1/2 absolute space-y-6 p-6 bg-white rounded shadow"
    >
      <h1 class="text-xl font-bold">待办事项</h1>
      <div
        hx-get="/api/ch03-todo/status"
        hx-trigger="load, status-change from:body"
      ></div>
      <form
        autocomplete="off"
        class="form grid gap-6"
        hx-post="/api/ch03-todo"
        hx-target="#todo-list"
        hx-swap="afterbegin"
        hx-disabled-elt="#add-btn"
        hx-on:htmx:after-request="this.reset()"
        x-data="{description:''}"
      >
        <div>
          <input
            type="text"
            id="description"
            name="description"
            x-model="description"
            required
          />
        </div>

        <div>
          <button type="submit" class="btn" id="add-btn">添加</button>
        </div>
      </form>

      <ul
        id="todo-list"
        hx-get="/api/ch03-todo"
        hx-trigger="load"
        class="space-y-3"
      ></ul>
    </main>
    <script
      src="https://lib.axum.eu.org/htmx/2.0.10/htmx.min.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/alpinejs/3.15.12/alpinejs.min.js"
      defer
    ></script>
    <script
      src="https://lib.axum.eu.org/basecoat/0.3.11/basecoat.all.min.js"
      defer
    ></script>
  </body>
</html>
